<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digitální Album - Tým Trampolín</title>
  <meta name="description" content="Poslouchej digitální album Tým Trampolín. Chráněný přístup pro podporovatele.">
  <style>
    :root {
      --bg-0: #06131f;
      --bg-1: #0b2136;
      --panel: rgba(9, 24, 40, 0.72);
      --panel-strong: rgba(10, 29, 48, 0.9);
      --line: rgba(141, 221, 255, 0.26);
      --line-strong: rgba(141, 221, 255, 0.52);
      --text: #e8f5ff;
      --muted: #a6c5dc;
      --accent: #44d4ff;
      --accent-2: #74ffc8;
      --danger: #ff8c9e;
      --ok: #7dffb0;
      --radius: 20px;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.36);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% -10%, rgba(120, 95, 255, 0.18), transparent 42%),
        radial-gradient(circle at 12% 10%, rgba(68, 212, 255, 0.26), transparent 30%),
        radial-gradient(circle at 88% 18%, rgba(116, 255, 200, 0.2), transparent 35%),
        linear-gradient(145deg, var(--bg-0), var(--bg-1));
      min-height: 100vh;
      overflow-x: hidden;
    }

    .grid-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.2;
      background-image:
        linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black, transparent 85%);
    }

    .page {
      width: min(1100px, 94vw);
      margin: 0 auto;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* LOGIN PANEL */
    .login-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 40px;
      background: linear-gradient(130deg, rgba(10, 30, 50, 0.86), rgba(7, 18, 32, 0.74));
      box-shadow: var(--shadow);
      max-width: 500px;
      width: 100%;
      animation: fadeIn 0.8s ease-out;
    }

    .login-panel h1 {
      margin: 0 0 12px 0;
      font-size: 2rem;
      letter-spacing: 0.06em;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-panel p {
      color: var(--muted);
      margin: 0 0 30px 0;
      font-size: 0.95rem;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .form-group input {
      padding: 12px 16px;
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: rgba(4, 16, 30, 0.88);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(4, 16, 30, 0.98);
      box-shadow: 0 0 20px rgba(68, 212, 255, 0.2);
    }

    .btn {
      padding: 14px 24px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }

    .btn-primary {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: #000;
      border: none;
    }

    .btn-primary:hover {
      box-shadow: 0 0 30px rgba(68, 212, 255, 0.4),
                  0 0 20px rgba(116, 255, 200, 0.3);
      transform: translateY(-2px);
    }

    .error-msg {
      color: var(--danger);
      font-size: 0.9rem;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    /* ALBUM PLAYER */
    .album-container {
      display: none;
      animation: fadeIn 0.8s ease-out;
      width: min(1120px, 100%);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(140deg, rgba(9, 25, 44, 0.9), rgba(4, 15, 28, 0.84));
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45), 0 0 45px rgba(68, 212, 255, 0.14);
      padding: 28px;
      position: relative;
      overflow: hidden;
    }

    .album-container.show {
      display: block;
    }

    .album-container::before {
      content: "";
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      top: -260px;
      right: -180px;
      border: 1px solid rgba(116, 255, 200, 0.22);
      box-shadow: inset 0 0 80px rgba(116, 255, 200, 0.08);
      pointer-events: none;
    }

    .album-container::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0.25;
      mask-image: radial-gradient(circle at center, black, transparent 88%);
      pointer-events: none;
    }

    .vinyl-section {
      text-align: center;
      margin-bottom: 60px;
    }

    .vinyl-wrapper {
      position: relative;
      width: 320px;
      height: 320px;
      margin: 0 auto 20px;
    }

    .vinyl {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #1a1a1a, #000);
      box-shadow:
        0 0 40px rgba(68, 212, 255, 0.3),
        inset 0 0 40px rgba(0, 0, 0, 0.8),
        inset 0 0 20px rgba(68, 212, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: spin 8s linear infinite;
    }

    .vinyl.paused {
      animation-play-state: paused;
    }

    .vinyl-label {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.8rem;
      text-align: center;
      color: #000;
      box-shadow: 0 0 20px rgba(68, 212, 255, 0.4);
      padding: 10px;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .album-info h2 {
      margin: 0 0 8px 0;
      font-size: 2rem;
      letter-spacing: 0.06em;
    }

    .album-info p {
      color: var(--muted);
      margin: 0;
      font-size: 1rem;
    }

    .album-meta {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .meta-chip {
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(68, 212, 255, 0.08);
      color: #cdeeff;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
    }

    .welcome-user {
      color: var(--accent-2);
      margin-top: 20px;
      font-size: 0.95rem;
    }

    .tracks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .track-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 24px;
      background: linear-gradient(145deg, rgba(8, 23, 39, 0.84), rgba(5, 16, 29, 0.92));
      backdrop-filter: blur(10px);
      transition: all 0.3s;
      position: relative;
    }

    .track-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 30px rgba(68, 212, 255, 0.2);
      transform: translateY(-4px);
    }

    .track-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(68, 212, 255, 0.7), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .track-card:hover::before {
      opacity: 1;
    }

    .track-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin: 0 0 12px 0;
      color: var(--text);
    }

    .track-subtitle {
      color: var(--muted);
      font-size: 0.85rem;
      margin: 0 0 16px 0;
    }

    audio {
      width: 100%;
      margin-bottom: 16px;
    }

    audio::-webkit-media-controls-panel {
      background-color: rgba(10, 29, 48, 0.9);
    }

    audio::-webkit-media-controls-current-time-display,
    audio::-webkit-media-controls-time-remaining-display {
      color: var(--text);
    }

    .track-controls {
      display: flex;
      gap: 10px;
    }

    .btn-small {
      flex: 1;
      padding: 10px 12px;
      font-size: 0.85rem;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(68, 212, 255, 0.1);
      color: var(--accent);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-small:hover {
      background: rgba(68, 212, 255, 0.25);
      border-color: var(--accent);
    }

    .logout-btn {
      margin-top: 40px;
      text-align: center;
    }

    .vote-section {
      margin-top: 34px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(140deg, rgba(8, 20, 34, 0.88), rgba(5, 16, 26, 0.92));
      padding: 18px;
      position: relative;
      z-index: 1;
    }

    .vote-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }

    .vote-title {
      margin: 0;
      font-size: 1.15rem;
      letter-spacing: 0.04em;
    }

    .vote-sub {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .vote-status {
      margin-top: 10px;
      min-height: 22px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .vote-status.ok { color: var(--ok); }
    .vote-status.err { color: var(--danger); }

    .vote-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .vote-row {
      display: grid;
      grid-template-columns: 1.2fr 1fr auto;
      align-items: center;
      gap: 12px;
      border: 1px solid rgba(141, 221, 255, 0.2);
      border-radius: 12px;
      padding: 10px;
      background: rgba(8, 23, 39, 0.7);
    }

    .vote-track {
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .vote-bar {
      height: 9px;
      border-radius: 999px;
      background: rgba(141, 221, 255, 0.16);
      overflow: hidden;
      position: relative;
    }

    .vote-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 0.35s ease;
      box-shadow: 0 0 12px rgba(68, 212, 255, 0.45);
    }

    .vote-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .vote-count {
      min-width: 34px;
      text-align: right;
      color: #d7f2ff;
      font-variant-numeric: tabular-nums;
    }

    .vote-btn {
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: rgba(68, 212, 255, 0.14);
      color: #d7f4ff;
      padding: 8px 11px;
      cursor: pointer;
      font-size: 0.8rem;
      letter-spacing: 0.03em;
      transition: all 0.2s;
    }

    .vote-btn:hover {
      border-color: var(--accent);
      background: rgba(68, 212, 255, 0.26);
    }

    .vote-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: rgba(141, 221, 255, 0.1);
      color: var(--muted);
      border: 1px solid var(--line);
    }

    .btn-secondary:hover {
      background: rgba(141, 221, 255, 0.2);
      border-color: var(--muted);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .page { padding: 20px 10px; }
      .vinyl-wrapper { width: 240px; height: 240px; }
      .album-info h2 { font-size: 1.5rem; }
      .tracks-grid { grid-template-columns: 1fr; }
      .album-container { padding: 16px; }
      .vote-row { grid-template-columns: 1fr; }
      .vote-right { justify-content: space-between; }
    }
  </style>
</head>
<body>
  <div class="grid-overlay"></div>

  <div class="page">
    <!-- LOGIN PANEL -->
    <div class="login-panel" id="loginPanel">
      <h1>Digitální Album</h1>
      <p>Vítej. Zadej své jméno pro přístup.</p>
      
      <div class="login-form">
        <div class="form-group">
          <label for="nameInput">Tvé jméno</label>
          <input 
            type="text" 
            id="nameInput" 
            placeholder="Napiš své jméno..."
            autocomplete="name"
          >
        </div>

        <div class="form-group">
          <label for="passwordInput">Heslo</label>
          <input 
            type="password" 
            id="passwordInput" 
            placeholder="Tvé unikátní heslo..."
            autocomplete="current-password"
          >
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <button class="btn btn-primary" id="loginBtn">Vstoupit</button>
      </div>
    </div>

    <!-- ALBUM PLAYER -->
    <div class="album-container" id="albumContainer">
      <div class="vinyl-section">
        <div class="vinyl-wrapper">
          <div class="vinyl" id="vinyl">
            <div class="vinyl-label">TÝM<br>TRAMPOLÍN</div>
          </div>
        </div>
        <div class="album-info">
          <h2>Digitální Album</h2>
          <p>Tým Trampolín</p>
          <div class="album-meta">
            <span class="meta-chip">10 verzí</span>
            <span class="meta-chip">Vinyl Mode</span>
            <span class="meta-chip">Members Access</span>
          </div>
          <div class="welcome-user" id="welcomeUser"></div>
        </div>
      </div>

      <div class="tracks-grid" id="tracksGrid"></div>

      <section class="vote-section" id="voteSection">
        <div class="vote-head">
          <div>
            <h3 class="vote-title">Hlasovani o nejlepsi verzi</h3>
            <p class="vote-sub">Kazde heslo ma presne 1 hlas. Vyber jen jednu verzi.</p>
          </div>
          <button class="btn-small" id="refreshVotesBtn" type="button">Obnovit vysledky</button>
        </div>
        <div class="vote-list" id="voteList"></div>
        <div class="vote-status" id="voteStatus"></div>
      </section>

      <div class="logout-btn">
        <button class="btn btn-secondary" id="logoutBtn">Odhlásit se</button>
      </div>
    </div>
  </div>

  <script>
    // ===== PASSWORD SYSTEM =====
    // Jednoduchý hash pro generování hesla z jména
    function simpleHash(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        const char = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash; // Convert to 32-bit integer
      }
      return Math.abs(hash);
    }

    function generatePassword(name) {
      const cleaned = name.trim().toLowerCase();
      if (!cleaned) return "";
      
      const hash = simpleHash(cleaned);
      // Vytvoř heslo ze slabik + hash
      const words = cleaned.split(/\s+/);
      const firstLetter = words[0] ? words[0][0].toUpperCase() : "";
      const passwordPart = cleaned.replace(/\s/g, "").slice(0, 6);
      const hashPart = (hash % 10000).toString();
      
      return `${firstLetter}${passwordPart}${hashPart}`.slice(0, 14);
    }

    // ===== ALBUM TRACKS =====
    const tracks = [
      { title: "Original", version: "Original verze", file: "original.mp3" },
      { title: "Phonk 1", version: "Phonk remix Vol.1", file: "phonk1.mp3" },
      { title: "Phonk 2", version: "Phonk remix Vol.2", file: "phonk2.mp3" },
      { title: "Hardstyle 1", version: "Hardstyle remix Vol.1", file: "hardstyle1.mp3" },
      { title: "Hardstyle 2", version: "Hardstyle remix Vol.2", file: "hardstyle2.mp3" },
      { title: "Hooligans", version: "Hooligans collaboration", file: "hooligans.mp3" },
      { title: "Tribe 1", version: "Tribe remix Vol.1", file: "tribe1.mp3" },
      { title: "Tribe 2", version: "Tribe remix Vol.2", file: "tribe2.mp3" },
      { title: "Epic 1", version: "Epic orchestral Vol.1", file: "epic1.mp3" },
      { title: "Epic 2", version: "Epic orchestral Vol.2", file: "epic2.mp3" }
    ];

    // ===== DOM ELEMENTS =====
    const loginPanel = document.getElementById("loginPanel");
    const albumContainer = document.getElementById("albumContainer");
    const nameInput = document.getElementById("nameInput");
    const passwordInput = document.getElementById("passwordInput");
    const loginBtn = document.getElementById("loginBtn");
    const errorMsg = document.getElementById("errorMsg");
    const welcomeUser = document.getElementById("welcomeUser");
    const tracksGrid = document.getElementById("tracksGrid");
    const logoutBtn = document.getElementById("logoutBtn");
    const vinyl = document.getElementById("vinyl");
    const voteList = document.getElementById("voteList");
    const voteStatus = document.getElementById("voteStatus");
    const refreshVotesBtn = document.getElementById("refreshVotesBtn");
    const ADMIN_USERNAME = "admin";
    const ADMIN_PASSWORD = "trampolin2026";
    const VOTE_NAMESPACE = "tym-trampolin-web-album-vote";

    let currentVoterKey = "";
    let currentUserName = "";

    async function getCountApiValue(key) {
      const res = await fetch(`https://api.countapi.xyz/get/${VOTE_NAMESPACE}/${encodeURIComponent(key)}`, { cache: "no-store" });
      if (!res.ok) throw new Error("countapi_get_failed");
      const data = await res.json();
      return Number(data && data.value ? data.value : 0);
    }

    async function setCountApiValue(key, value) {
      const res = await fetch(`https://api.countapi.xyz/set/${VOTE_NAMESPACE}/${encodeURIComponent(key)}?value=${encodeURIComponent(String(value))}`, { cache: "no-store" });
      if (!res.ok) throw new Error("countapi_set_failed");
      return res.json();
    }

    async function hitCountApiValue(key) {
      const res = await fetch(`https://api.countapi.xyz/hit/${VOTE_NAMESPACE}/${encodeURIComponent(key)}`, { cache: "no-store" });
      if (!res.ok) throw new Error("countapi_hit_failed");
      return res.json();
    }

    function getVoterKeyFromPassword(password) {
      const normalized = String(password || "").trim();
      return normalized ? `voter_${simpleHash(normalized.toLowerCase())}` : "";
    }

    function getVoteKey(trackIndex) {
      return `track_${trackIndex}`;
    }

    function setVoteStatus(text, type) {
      voteStatus.textContent = text || "";
      voteStatus.classList.remove("ok", "err");
      if (type) voteStatus.classList.add(type);
    }

    // ===== LOGIN LOGIC =====
    function login() {
      const name = nameInput.value.trim();
      const password = passwordInput.value;

      if (!name) {
        showError("Prosím, zadej své jméno.");
        return;
      }

      if (!password) {
        showError("Prosím, zadej heslo.");
        return;
      }

      if (name.toLowerCase() === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
        successLogin("admin", password);
        return;
      }

      const correctPassword = generatePassword(name);
      if (password !== correctPassword) {
        showError("Nesprávné heslo. Kontroluj svůj e-mail pro správné heslo.");
        passwordInput.value = "";
        return;
      }

      successLogin(name, password);
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add("show");
      setTimeout(() => {
        errorMsg.classList.remove("show");
      }, 4000);
    }

    function successLogin(name, password) {
      currentUserName = name;
      currentVoterKey = getVoterKeyFromPassword(password || "");

      if (!currentVoterKey && name && name.toLowerCase() === ADMIN_USERNAME) {
        currentVoterKey = getVoterKeyFromPassword(ADMIN_PASSWORD);
      }

      if (!currentVoterKey && name) {
        currentVoterKey = getVoterKeyFromPassword(generatePassword(name));
      }

      sessionStorage.setItem("albumUserName", name);
      sessionStorage.setItem("albumVoterKey", currentVoterKey || "");
      loginPanel.style.display = "none";
      albumContainer.classList.add("show");
      welcomeUser.textContent = `Vítej, ${name}! 🎵`;
      renderTracks();
      renderVotePanel();
      refreshVoteResults();
    }

    function logout() {
      sessionStorage.removeItem("albumUserName");
      sessionStorage.removeItem("albumVoterKey");
      loginPanel.style.display = "block";
      albumContainer.classList.remove("show");
      nameInput.value = "";
      passwordInput.value = "";
      vinyl.classList.remove("paused");
      voteList.innerHTML = "";
      setVoteStatus("", "");
      currentVoterKey = "";
      currentUserName = "";
    }

    // ===== RENDER TRACKS =====
    function renderTracks() {
      tracksGrid.innerHTML = "";
      tracks.forEach((track, index) => {
        const card = document.createElement("div");
        card.className = "track-card";
        card.innerHTML = `
          <h3 class="track-title">${track.title}</h3>
          <p class="track-subtitle">${track.version}</p>
          <audio 
            id="audio-${index}" 
            controls 
            onplay="onTrackPlay(${index})"
            onpause="onTrackPause()"
          >
            <source src="media/album/${track.file}" type="audio/mpeg">
            Tvůj prohlížeč nepodporuje audio přehrávání.
          </audio>
          <div class="track-controls">
            <button class="btn-small" onclick="downloadTrack('${track.file}', '${track.title}')">
              ⬇ Stáhnout
            </button>
          </div>
        `;
        tracksGrid.appendChild(card);
      });
    }

    function onTrackPlay(index) {
      vinyl.classList.add("playing");
      vinyl.style.animationPlayState = "running";
    }

    function onTrackPause() {
      vinyl.classList.add("paused");
      vinyl.style.animationPlayState = "paused";
    }

    function downloadTrack(filename, title) {
      const link = document.createElement("a");
      link.href = `media/album/${filename}`;
      link.download = `${title} - Tým Trampolín.mp3`;
      link.click();
    }

    function renderVotePanel() {
      voteList.innerHTML = tracks.map((track, index) => `
        <div class="vote-row">
          <div class="vote-track">${track.title}</div>
          <div class="vote-bar"><div class="vote-bar-fill" id="voteFill-${index}"></div></div>
          <div class="vote-right">
            <span class="vote-count" id="voteCount-${index}">0</span>
            <button class="vote-btn" type="button" data-vote-index="${index}">Hlasovat</button>
          </div>
        </div>
      `).join("");
    }

    async function refreshVoteResults() {
      try {
        const values = await Promise.all(tracks.map((_, index) => getCountApiValue(getVoteKey(index)).catch(() => 0)));
        const maxVotes = Math.max(1, ...values);

        values.forEach((count, index) => {
          const countEl = document.getElementById(`voteCount-${index}`);
          const fillEl = document.getElementById(`voteFill-${index}`);
          if (countEl) countEl.textContent = String(count);
          if (fillEl) {
            const pct = Math.min(100, Math.round((count / maxVotes) * 100));
            fillEl.style.width = `${pct}%`;
          }
        });

        const votedAlready = currentVoterKey ? await getCountApiValue(currentVoterKey).catch(() => 0) : 0;
        const voteButtons = document.querySelectorAll("button[data-vote-index]");
        voteButtons.forEach((btn) => {
          btn.disabled = votedAlready > 0;
        });

        if (votedAlready > 0) {
          setVoteStatus("Tvuj hlas je uz zapocitany. Diky!", "ok");
        } else {
          setVoteStatus("Mas 1 hlas. Vyber jednu verzi.", "");
        }
      } catch (e) {
        setVoteStatus("Nepodarilo se nacist vysledky hlasovani.", "err");
      }
    }

    async function castVote(trackIndex) {
      if (!currentVoterKey) {
        setVoteStatus("Chybi identita hlasu. Odhlas se a prihlas znovu.", "err");
        return;
      }

      try {
        const votedAlready = await getCountApiValue(currentVoterKey).catch(() => 0);
        if (votedAlready > 0) {
          setVoteStatus("Tohle heslo uz hlasovalo.", "err");
          await refreshVoteResults();
          return;
        }

        await setCountApiValue(currentVoterKey, 1);
        await hitCountApiValue(getVoteKey(trackIndex));
        setVoteStatus(`Hlas pro ${tracks[trackIndex].title} byl ulozen.`, "ok");
        await refreshVoteResults();
      } catch (e) {
        setVoteStatus("Hlasovani se nepodarilo ulozit. Zkus to znovu.", "err");
      }
    }

    // ===== EVENT LISTENERS =====
    loginBtn.addEventListener("click", login);
    passwordInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });
    logoutBtn.addEventListener("click", logout);
    refreshVotesBtn.addEventListener("click", refreshVoteResults);
    voteList.addEventListener("click", (event) => {
      const btn = event.target.closest("button[data-vote-index]");
      if (!btn) return;
      const index = Number(btn.dataset.voteIndex);
      if (!Number.isInteger(index) || index < 0 || index >= tracks.length) return;
      castVote(index);
    });

    // ===== CHECK SESSION =====
    window.addEventListener("load", () => {
      const userName = sessionStorage.getItem("albumUserName");
      const voterKey = sessionStorage.getItem("albumVoterKey") || "";
      if (userName) {
        nameInput.value = userName;
        currentVoterKey = voterKey;
        successLogin(userName, userName.toLowerCase() === ADMIN_USERNAME ? ADMIN_PASSWORD : generatePassword(userName));
      }
    });
  </script>
</body>
</html>
