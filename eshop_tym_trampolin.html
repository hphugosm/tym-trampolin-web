<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tym Trampolin | E-shop podpory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-0: #06131f;
  --bg-1: #0b2136;
  --panel: rgba(9, 24, 40, 0.72);
  --panel-strong: rgba(10, 29, 48, 0.9);
  --line: rgba(141, 221, 255, 0.26);
  --line-strong: rgba(141, 221, 255, 0.52);
  --text: #e8f5ff;
  --muted: #a6c5dc;
  --accent: #44d4ff;
  --accent-2: #74ffc8;
  --danger: #ff8c9e;
  --ok: #7dffb0;
  --radius: 20px;
  --shadow: 0 24px 70px rgba(0, 0, 0, 0.36);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: Rajdhani, "Segoe UI", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at 12% 10%, rgba(68, 212, 255, 0.26), transparent 30%),
    radial-gradient(circle at 88% 18%, rgba(116, 255, 200, 0.2), transparent 35%),
    radial-gradient(circle at 60% 95%, rgba(255, 210, 110, 0.14), transparent 34%),
    linear-gradient(145deg, var(--bg-0), var(--bg-1));
  min-height: 100vh;
}

.grid-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.2;
  background-image:
    linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
  background-size: 42px 42px;
  mask-image: radial-gradient(circle at center, black, transparent 85%);
}

.page {
  width: min(1180px, 94vw);
  margin: 40px auto 90px;
}

.hero {
  border: 1px solid var(--line);
  border-radius: calc(var(--radius) + 4px);
  padding: 34px 24px;
  background: linear-gradient(130deg, rgba(10, 30, 50, 0.86), rgba(7, 18, 32, 0.74));
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
  animation: fadeIn 0.8s ease-out;
}

.hero::after {
  content: "";
  position: absolute;
  width: 360px;
  height: 360px;
  border-radius: 50%;
  right: -120px;
  top: -160px;
  border: 2px solid rgba(68, 212, 255, 0.25);
}

h1 {
  font-family: Orbitron, sans-serif;
  margin: 0;
  letter-spacing: 0.06em;
  font-size: clamp(1.8rem, 4vw, 3rem);
}

.subtitle {
  margin-top: 12px;
  max-width: 700px;
  color: var(--muted);
  font-size: 1.15rem;
}

.layout {
  margin-top: 24px;
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  gap: 18px;
}

.panel {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--panel);
  box-shadow: var(--shadow);
}

.panel h2 {
  margin: 0 0 14px;
  font-size: 1.4rem;
  font-family: Orbitron, sans-serif;
  letter-spacing: 0.04em;
}

.products { padding: 20px; }

.product-list {
  display: grid;
  gap: 12px;
}

.product {
  border: 1px solid var(--line);
  background: rgba(8, 22, 36, 0.62);
  border-radius: 14px;
  padding: 14px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  align-items: center;
  transition: transform 0.18s ease, border-color 0.2s ease;
}

.product:hover {
  transform: translateY(-3px);
  border-color: var(--line-strong);
}

.product-title {
  font-size: 1.18rem;
  font-weight: 700;
}

.price {
  color: var(--accent-2);
  font-size: 1.1rem;
  font-weight: 700;
}

.qty {
  display: flex;
  gap: 8px;
  align-items: center;
}

.qty button {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: rgba(9, 28, 45, 0.8);
  color: var(--text);
  font-size: 1rem;
  cursor: pointer;
}

.qty-value {
  min-width: 26px;
  text-align: center;
  font-weight: 700;
}

.checkout {
  padding: 20px;
  background: var(--panel-strong);
  animation: slideUp 0.7s ease-out;
}

.field { margin-bottom: 12px; }

label {
  display: block;
  margin-bottom: 4px;
  font-size: 1rem;
  color: var(--muted);
}

input, textarea, select {
  width: 100%;
  background: rgba(4, 13, 24, 0.86);
  color: var(--text);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 10px 12px;
  font-family: Rajdhani, sans-serif;
  font-size: 1rem;
}

.delivery {
  display: grid;
  gap: 8px;
  margin: 8px 0 14px;
}

.delivery-option {
  display: flex;
  gap: 10px;
  align-items: center;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: rgba(6, 17, 29, 0.72);
}

.summary {
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 12px;
  background: rgba(8, 24, 38, 0.75);
  margin-bottom: 12px;
}

.summary-row {
  display: flex;
  justify-content: space-between;
  margin: 6px 0;
}

.summary-total {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--line);
  font-weight: 700;
  font-size: 1.12rem;
}

.actions {
  display: grid;
  gap: 8px;
}

button.primary, button.secondary {
  border-radius: 12px;
  border: 1px solid var(--line-strong);
  padding: 11px 14px;
  font-family: Orbitron, sans-serif;
  letter-spacing: 0.04em;
  cursor: pointer;
}

button.primary {
  background: linear-gradient(115deg, #20c7ff, #42f4bc);
  color: #042234;
}

button.secondary {
  background: rgba(9, 28, 45, 0.85);
  color: var(--text);
}

.notice {
  margin-top: 8px;
  font-size: 0.98rem;
  color: var(--muted);
}

.message { min-height: 24px; font-weight: 700; }
.message.ok { color: var(--ok); }
.message.err { color: var(--danger); }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="grid-overlay"></div>

<main class="page">
  <section class="hero">
    <h1>E-SHOP PODPORY TYMU TRAMPOLIN</h1>
    <p class="subtitle">Podpor nas projekt pres oficialni merchandise. Vyber produkty, nastav pocet kusu a odesli objednavku e-mailem.</p>
  </section>

  <section class="layout">
    <article class="panel products">
      <h2>Produkty</h2>
      <div class="product-list" id="productList"></div>
    </article>

    <aside class="panel checkout">
      <h2>Objednavka</h2>

      <div class="field">
        <label for="name">Jmeno a prijmeni</label>
        <input id="name" type="text" placeholder="Tvoje jmeno">
      </div>

      <div class="field">
        <label for="phone">Telefon</label>
        <input id="phone" type="text" placeholder="+420 ...">
      </div>

      <div class="field">
        <label for="email">Tvuj e-mail</label>
        <input id="email" type="email" placeholder="mail@domena.cz">
      </div>

      <div class="field">
        <label>Zpusob predani</label>
        <div class="delivery">
          <label class="delivery-option"><input type="radio" name="delivery" value="osobni" checked> Osobni predani (0 Kc)</label>
          <label class="delivery-option"><input type="radio" name="delivery" value="posta"> Doprava + postovne a balne (100 Kc)</label>
        </div>
      </div>

      <div class="field">
        <label for="note">Poznamka k objednavce</label>
        <textarea id="note" rows="3" placeholder="Napriklad kde se potkat nebo pozadovany termin"></textarea>
      </div>

      <div class="summary" id="summary"></div>

      <div class="actions">
        <button class="primary" id="orderBtn" type="button">Objednat e-mailem</button>
        <button class="secondary" id="copyBtn" type="button">Kopirovat souhrn</button>
      </div>

      <p class="notice">Objednavka se pripravi do e-mailu na adresu: <strong id="targetEmailText"></strong></p>
      <p class="notice">Vsechny produkty budou dorucene do 3 tydnu od objednavky.</p>
      <p class="message" id="message"></p>
    </aside>
  </section>
</main>

<script>
const ORDER_EMAIL = "hugo.kubicek@icloud.com";

const products = [
  { id: "socha", name: "Socha Tymu Trampolin", price: 500, qty: 0 },
  { id: "klicenka", name: "Klicenka Tym Trampolin", price: 50, qty: 0 },
  { id: "odznacek", name: "Odznacek Tym Trampolin", price: 50, qty: 0 },
  { id: "cd", name: "CD Tym Trampolin", price: 300, qty: 0 }
];

const productList = document.getElementById("productList");
const summaryEl = document.getElementById("summary");
const targetEmailText = document.getElementById("targetEmailText");
const messageEl = document.getElementById("message");

function bumpLocalMetric(metricKey) {
  const key = `tt_metric_${metricKey}`;
  const current = Number(localStorage.getItem(key) || 0);
  localStorage.setItem(key, String(current + 1));
}

function trackMetric(metricKey) {
  bumpLocalMetric(metricKey);
  const endpoint = `https://api.countapi.xyz/hit/tym-trampolin-web/${metricKey}`;
  fetch(endpoint, { cache: "no-store", keepalive: true }).catch(() => {});
}

trackMetric("page_views");
trackMetric("eshop_views");

targetEmailText.textContent = ORDER_EMAIL;

function formatPrice(value) {
  return `${value.toLocaleString("cs-CZ")} Kc`;
}

function getDeliveryFee() {
  const selected = document.querySelector("input[name='delivery']:checked");
  return selected && selected.value === "posta" ? 100 : 0;
}

function getProductsTotal() {
  return products.reduce((sum, p) => sum + p.price * p.qty, 0);
}

function renderProducts() {
  productList.innerHTML = "";
  products.forEach((product) => {
    const item = document.createElement("div");
    item.className = "product";
    item.innerHTML = `
      <div>
        <div class="product-title">${product.name}</div>
        <div class="price">${formatPrice(product.price)}</div>
      </div>
      <div class="qty">
        <button type="button" data-action="minus" data-id="${product.id}">-</button>
        <span class="qty-value" id="qty-${product.id}">${product.qty}</span>
        <button type="button" data-action="plus" data-id="${product.id}">+</button>
      </div>
    `;
    productList.appendChild(item);
  });
}

function renderSummary() {
  const productsTotal = getProductsTotal();
  const deliveryFee = getDeliveryFee();
  const total = productsTotal + deliveryFee;

  summaryEl.innerHTML = `
    <div class="summary-row"><span>Produkty:</span><strong>${formatPrice(productsTotal)}</strong></div>
    <div class="summary-row"><span>Doprava a balne:</span><strong>${formatPrice(deliveryFee)}</strong></div>
    <div class="summary-row summary-total"><span>Celkem:</span><strong>${formatPrice(total)}</strong></div>
  `;
}

function selectedProductsLines() {
  return products
    .filter((p) => p.qty > 0)
    .map((p) => `- ${p.name}: ${p.qty} ks x ${formatPrice(p.price)} = ${formatPrice(p.qty * p.price)}`)
    .join("\n");
}

function orderText() {
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const email = document.getElementById("email").value.trim();
  const note = document.getElementById("note").value.trim();
  const delivery = document.querySelector("input[name='delivery']:checked").value;
  const deliveryLabel = delivery === "posta" ? "Doprava + postovne a balne (100 Kc)" : "Osobni predani (0 Kc)";
  const productsTotal = getProductsTotal();
  const deliveryFee = getDeliveryFee();
  const total = productsTotal + deliveryFee;

  return [
    "Dobry den, posilam objednavku z E-shopu podpory Tym Trampolin:",
    "",
    "Zakaznik:",
    `Jmeno: ${name || "(neuvedeno)"}`,
    `Telefon: ${phone || "(neuvedeno)"}`,
    `E-mail: ${email || "(neuvedeno)"}`,
    "",
    "Objednane produkty:",
    selectedProductsLines(),
    "",
    `Predani: ${deliveryLabel}`,
    `Mezisoucet: ${formatPrice(productsTotal)}`,
    `Doprava a balne: ${formatPrice(deliveryFee)}`,
    `Celkem k uhrade: ${formatPrice(total)}`,
    "Doruceni: vsechny produkty budou dorucene do 3 tydnu od objednavky.",
    "",
    `Poznamka: ${note || "bez poznamky"}`
  ].join("\n");
}

function setMessage(text, type) {
  messageEl.textContent = text;
  messageEl.className = `message ${type}`;
}

productList.addEventListener("click", (event) => {
  const btn = event.target.closest("button[data-id]");
  if (!btn) return;

  const product = products.find((p) => p.id === btn.dataset.id);
  if (!product) return;

  if (btn.dataset.action === "plus") {
    product.qty += 1;
  } else if (btn.dataset.action === "minus" && product.qty > 0) {
    product.qty -= 1;
  }

  document.getElementById(`qty-${product.id}`).textContent = product.qty;
  renderSummary();
  setMessage("", "");
});

document.querySelectorAll("input[name='delivery']").forEach((radio) => {
  radio.addEventListener("change", () => {
    renderSummary();
    setMessage("", "");
  });
});

document.getElementById("orderBtn").addEventListener("click", () => {
  const chosenCount = products.reduce((sum, p) => sum + p.qty, 0);
  if (chosenCount === 0) {
    setMessage("Vyber aspon jeden produkt.", "err");
    return;
  }

  const subject = encodeURIComponent("Objednavka - E-shop podpory Tym Trampolin");
  const body = encodeURIComponent(orderText());
  trackMetric("order_clicks");
  window.location.href = `mailto:${ORDER_EMAIL}?subject=${subject}&body=${body}`;
  setMessage("Objednavka byla pripravena do e-mailu.", "ok");
});

document.getElementById("copyBtn").addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(orderText());
    setMessage("Souhrn objednavky zkopirovan do schranky.", "ok");
  } catch (err) {
    setMessage("Schranku se nepodarilo pouzit. Zkus objednat e-mailem.", "err");
  }
});

renderProducts();
renderSummary();
</script>
</body>
</html>
