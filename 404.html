<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://hphugosm.github.io/tym-trampolin-web/404.html">
<meta name="robots" content="noindex,follow">
<title>404 | Stránka nenalezena</title>
<meta name="description" content="Požadovaná stránka nebyla nalezena. Vrať se na hlavní stránku Týmu Trampolín.">
<link rel="stylesheet" href="site-theme.css">
<style>
main { min-height: 70vh; display: grid; place-items: center; }
.not-found { max-width: 720px; text-align: center; }
.not-found h1 { font-size: clamp(42px, 9vw, 84px); margin: 0 0 12px; }
.not-found p { color: var(--muted); margin: 0 0 24px; }
.actions { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
</style>
</head>
<body>
<div class="bg-fixed"></div>
<div class="bg-vignette"></div>
<canvas id="particles"></canvas>

<main class="wrap">
  <section class="glass not-found reveal visible">
    <div class="kicker">Chyba 404</div>
    <h1><span class="gradient">Stránka Nenalezena</span></h1>
    <p>Tahle adresa neexistuje nebo byla přesunuta. Pokračuj na hlavní stránku nebo do sekce úspěchů.</p>
    <div class="actions">
      <a class="btn" href="index.html">Domů</a>
      <a class="btn secondary" href="uspechy.html">Úspěchy</a>
    </div>
  </section>
</main>

<script src="assets/js/particles.js"></script>
<script src="tracking.js"></script>
<script>
const tracker = window.TTTracking;
if (tracker) tracker.trackPageView("404");
</script>
</body>
</html>
