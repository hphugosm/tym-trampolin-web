<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tym Trampolin | Admin Metrics</title>
<style>
:root {
  --bg0: #050b16;
  --bg1: #07152a;
  --line: rgba(99, 255, 198, 0.34);
  --line-soft: rgba(99, 255, 198, 0.16);
  --text: #dffff4;
  --muted: #8ec5b5;
  --warn: #ffd680;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  font-family: "Courier New", ui-monospace, SFMono-Regular, Menlo, monospace;
  color: var(--text);
  background:
    radial-gradient(circle at 12% 10%, rgba(65, 255, 191, 0.20), transparent 32%),
    radial-gradient(circle at 88% 18%, rgba(76, 183, 255, 0.16), transparent 28%),
    linear-gradient(145deg, var(--bg0), var(--bg1));
  padding: 28px 16px;
}
.shell {
  width: min(860px, 100%);
  margin: 0 auto;
  border: 1px solid var(--line);
  border-radius: 16px;
  background: rgba(3, 15, 28, 0.86);
  box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45), 0 0 28px rgba(65, 255, 191, 0.14);
  overflow: hidden;
}
.head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--line-soft);
  font-size: 12px;
  color: #95ffcf;
  letter-spacing: .08em;
}
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #55ffc0;
  box-shadow: 0 0 12px #55ffc0;
  display: inline-block;
  margin-right: 8px;
  animation: blink 1.4s ease-in-out infinite;
}
.grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  padding: 16px;
}
.card {
  border: 1px solid var(--line-soft);
  border-radius: 12px;
  background: rgba(8, 30, 34, 0.55);
  padding: 14px;
}
.card h3 {
  margin: 0;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: .04em;
}
.val {
  margin-top: 10px;
  font-size: clamp(1.5rem, 5vw, 2.2rem);
  font-weight: 700;
  color: #e8fff6;
}
.links {
  border-top: 1px solid var(--line-soft);
  padding: 14px 16px 16px;
  display: grid;
  gap: 10px;
}
.links a {
  color: #b9ffe4;
  text-decoration: none;
  border: 1px solid var(--line-soft);
  border-radius: 10px;
  padding: 9px 11px;
  background: rgba(6, 24, 28, 0.46);
}
.note {
  color: var(--warn);
  font-size: 12px;
  padding: 0 16px 16px;
}
@keyframes blink {
  0%, 100% { opacity: .35; }
  50% { opacity: 1; }
}
@media (max-width: 760px) {
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
  <section class="shell">
    <header class="head">
      <div><span class="dot"></span>TYM TRAMPOLIN :: ADMIN METRICS</div>
      <div id="lastUpdate">SYNC --</div>
    </header>

    <div class="grid">
      <article class="card">
        <h3>eshop_clicks</h3>
        <div class="val" id="metricEshop">--</div>
      </article>
      <article class="card">
        <h3>order_clicks</h3>
        <div class="val" id="metricOrder">--</div>
      </article>
      <article class="card">
        <h3>conversion</h3>
        <div class="val" id="metricConv">--</div>
      </article>
    </div>

    <div class="links">
      <a href="Index2_updated_final_complete_fixed_sharinglink_v3.html">Otevrit hlavni web (v3)</a>
      <a href="eshop_tym_trampolin.html">Otevrit e-shop podpory</a>
    </div>

    <p class="note">Anonymni metriky bez osobnich udaju. Refresh kazdych 15 sekund.</p>
  </section>

<script>
async function readMetric(metricKey) {
  const endpoint = `https://api.countapi.xyz/get/tym-trampolin-web/${metricKey}`;
  const res = await fetch(endpoint, { cache: "no-store" });
  if (!res.ok) throw new Error("metric fetch failed");
  const data = await res.json();
  return Number(data.value || 0);
}

function render(eshopClicks, orderClicks) {
  const conversion = eshopClicks > 0 ? (orderClicks / eshopClicks) * 100 : 0;
  document.getElementById("metricEshop").textContent = String(eshopClicks);
  document.getElementById("metricOrder").textContent = String(orderClicks);
  document.getElementById("metricConv").textContent = `${conversion.toFixed(1)}%`;
  document.getElementById("lastUpdate").textContent = `SYNC ${new Date().toLocaleTimeString("cs-CZ")}`;
}

async function refresh() {
  try {
    const [eshopClicks, orderClicks] = await Promise.all([
      readMetric("eshop_clicks"),
      readMetric("order_clicks")
    ]);
    render(eshopClicks, orderClicks);
  } catch (e) {
    document.getElementById("lastUpdate").textContent = "SYNC ERROR";
  }
}

refresh();
setInterval(refresh, 15000);
</script>
</body>
</html>
